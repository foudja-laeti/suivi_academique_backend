apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel-app-green
  labels:
    app: laravel
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: laravel
      version: green
  template:
    metadata:
      labels:
        app: laravel
        version: green
    spec:
      containers:
        - name: laravel
          image: laeti2005/suivi_academique_backend:latest
          imagePullPolicy: Always  
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
