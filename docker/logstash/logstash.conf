input {
  file {
    # CORRIGÉ : chemin correspondant au volume monté dans docker-compose
    path => "/var/www/storage/logs/laravel.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "laravel"
  }
}

filter {
  if [type] == "laravel" {
    grok {
      # CORRIGÉ : pattern qui capture correctement les logs Laravel
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{WORD:env}\.%{LOGLEVEL:level}: %{GREEDYDATA:log_message}"
      }
      overwrite => ["message"]
    }
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
    mutate {
      add_field => { "application" => "suivi_academique_backend" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "laravel-logs-%{+YYYY.MM.dd}"
  }
  # CORRIGÉ : stdout pour debug — voir les logs arriver dans docker logs logstash
  stdout {
    codec => rubydebug
  }
}
