name: Multi-Environment Deploy

on:
  push:
    branches: [ "main", "staging", "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "ENV_NAME=production" >> $GITHUB_ENV
            echo "APP_ENV=production" >> $GITHUB_ENV
            echo "APP_DEBUG=false" >> $GITHUB_ENV
            echo "DOCKER_TAG=latest" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" == "staging" ]; then
            echo "ENV_NAME=staging" >> $GITHUB_ENV
            echo "APP_ENV=staging" >> $GITHUB_ENV
            echo "APP_DEBUG=true" >> $GITHUB_ENV
            echo "DOCKER_TAG=staging" >> $GITHUB_ENV
          else
            echo "ENV_NAME=development" >> $GITHUB_ENV
            echo "APP_ENV=local" >> $GITHUB_ENV
            echo "APP_DEBUG=true" >> $GITHUB_ENV
            echo "DOCKER_TAG=dev" >> $GITHUB_ENV
          fi

      - name: Show environment
        run: |
          echo "Deploying to: $ENV_NAME"
          echo "Docker tag: $DOCKER_TAG"
          echo "APP_ENV: $APP_ENV"
          echo "APP_DEBUG: $APP_DEBUG"

      - name: Build Docker image
        run: |
          docker build \
            --build-arg APP_ENV=${{ env.APP_ENV }} \
            --build-arg APP_DEBUG=${{ env.APP_DEBUG }} \
            -t ${{ secrets.SA_DOCKERHUB_LOGIN }}/suivi_academique_backend:${{ env.DOCKER_TAG }} .

      - name: Push to Docker Hub
        run: |
          echo "${{ secrets.SA_DOKERHUB_TOKEN }}" | docker login -u "${{ secrets.SA_DOCKERHUB_LOGIN }}" --password-stdin
          docker push ${{ secrets.SA_DOCKERHUB_LOGIN }}/suivi_academique_backend:${{ env.DOCKER_TAG }}

      - name: Summary
        run: |
          echo "✅ Deployed to $ENV_NAME"
          echo "🐳 Image: ${{ secrets.SA_DOCKERHUB_LOGIN }}/suivi_academique_backend:${{ env.DOCKER_TAG }}"
