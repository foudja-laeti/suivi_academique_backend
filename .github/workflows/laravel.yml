name: Laravel

on: #definit les event qui déclenche le pipeline
  push: # Se déclenche lors d'un envoi de code
    branches: [ "main" ]
  pull_request: # Se déclenche lors d'une demande de fusion
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest # Utilise la dernière version de la machine virtuelle Ubuntu

    services: # Lance des conteneurs de services nécessaires pour les tests
      mysql: #
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: suivi_academique_backend
        ports:
          - 3306:3306
        options: >- # Vérifications pour s'assurer que MySQL est prêt
          --health-cmd="mysqladmin ping" # Commande de test de connexion
          --health-interval=10s # Test toutes les 10 secondes
          --health-timeout=5s # Temps d'attente max d'une réponse
          --health-retries=3 # Échec après 3 tentatives infructueuses

    steps: # Liste des étapes séquentielles à suivre
    - uses: shivammathur/setup-php@15c43e89cdef867065b0213be354c2841860869e
      with:
        php-version: '8.4'
        extensions: pdo_mysql #

    - uses: actions/checkout@v4 # Récupère (clone) le code source du dépôt dans la machine

    - name: Copy .env # Étape pour créer le fichier de configuration Laravel
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install Dependencies # Étape d'installation des packages
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Run Linting (Laravel Pint)
      run: ./vendor/bin/pint --test

    - name: Generate key # Étape de sécurité Laravel
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Run Migrations
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: suivi_academique_backend
        DB_USERNAME: root
        DB_PASSWORD: root
      run: php artisan migrate --force

    - name: Execute tests
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: suivi_academique_backend
        DB_USERNAME: root
        DB_PASSWORD: root
      run: php artisan test

    - name: Build and Push to Docker Hub # Étape finale de déploiement (Continuous Delivery)
      run: |
        echo "${{ secrets.SA_DOKERHUB_TOKEN }}" | docker login -u "${{ secrets.SA_DOCKERHUB_LOGIN }}" --password-stdin # Connexion sécurisée à Docker Hub
        docker build -t ${{ secrets.SA_DOCKERHUB_LOGIN }}/suivi_academique_backend:latest . # Construit l'image Docker de l'application
        docker push ${{ secrets.SA_DOCKERHUB_LOGIN }}/suivi_academique_backend:latest # Envoie l'image finale sur le registre en ligne
