name: CI-CD suivie-Academique (Full Pipeline FTP)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # --- PARTIE 1 : QUALITÉ & TESTS (BACKEND) ---
  laravel-tests:
    name: "🛡️ Qualité & Tests (Backend)"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: laravel_test
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: "📦 Récupération du code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "⚙️ Installation PHP 8.4"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql, bcmath
          coverage: xdebug

      - name: "📥 Installation Dépendances (Composer)"
        working-directory: ./Backend
        run: |
          echo "🚀 Démarrage de l'installation Composer..."
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          echo "✅ Dépendances installées."

      - name: "🧪 Exécution des Tests"
        working-directory: ./Backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
        run: |
          cp .env.example .env
          php artisan key:generate
          echo "🏃 Lancement des tests..."
          php artisan test
          echo "✅ Tests terminés."

  # --- PARTIE 2 : BUILD FRONTEND ---
  frontend-build:
    name: "🌐 Build Frontend (React)"
    needs: laravel-tests
    runs-on: ubuntu-latest
    steps:
      - name: "📦 Récupération du code"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./Frontend/package-lock.json

      - name: "🏗️ Build Vite"
        working-directory: ./Frontend
        run: |
          echo "📦 Installation npm..."
          npm install
          echo "🛠️ Build de production..."
          npm run build
          echo "📂 Vérification du dossier dist :"
          ls -la dist/

      - name: "📤 Archivage du Build"
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist/

  # --- PARTIE 3 : DOCKER HUB ---
  docker-hub:
    name: "🐳 Build & Push Docker"
    needs: laravel-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: "📦 Récupération du code"
        uses: actions/checkout@v4
      - name: "🔑 Login Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SA_DOCKERHUB_LOGIN }}
          password: ${{ secrets.SA_DOKERHUB_TOKEN }}
      - name: "🚀 Build & Push"
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.SA_DOCKERHUB_LOGIN}}/exchapay-backend:latest
            ${{ secrets.SA_DOCKERHUB_LOGIN}}/exchapay-backend:${{ github.sha }}

  # --- PARTIE 4 : DÉPLOIEMENT O2SWITCH ---
  deploy-o2switch:
    name: "🚀 Déploiement o2switch (FTP)"
    needs: [frontend-build] 
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    
    steps:
      - name: "📦 Récupération du code source"
        uses: actions/checkout@v4

      - name: "📥 Récupération du Build Frontend"
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist-frontend

      - name: "🔍 DEBUG : Inspection des dossiers locaux avant FTP"
        run: |
          echo "--- CONTENU RACINE ---"
          ls -F
          echo "--- CONTENU BACKEND (Source) ---"
          if [ -d "./Backend" ]; then ls -la ./Backend; else echo "❌ Dossier ./Backend introuvable !"; fi
          echo "--- CONTENU FRONTEND DIST (Source) ---"
          if [ -d "./dist-frontend" ]; then ls -la ./dist-frontend; else echo "❌ Dossier ./dist-frontend introuvable !"; fi

      - name: "🚀 Déploiement Backend via FTP"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./Backend/
          server-dir: Backend_Code/
          log-level: verbose
          exclude: |
            **/vendor/**
            **/.env
            **/.git*
            **/node_modules/**

      - name: "🚀 Déploiement Frontend via FTP"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist-frontend/
          server-dir: Frontend_Public/
          log-level: verbose

      - name: "✨ Logs de fin"
        run: |
          echo "✅ Déploiement FTP terminé."
          echo "🔗 URL : https://foudja.cdwfs.net"
          echo "🕒 $(date)"