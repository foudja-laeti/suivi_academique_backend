name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: suivi_academique_backend
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@15c43e89cdef867065b0213be354c2841860869e
        with:
          php-version: '8.4'
          extensions: pdo_mysql, xdebug

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Run Linting (Laravel Pint)
        run: ./vendor/bin/pint --test

      # ─── DevSecOps : Audit des dépendances PHP ───────────────────────────────
      - name: "[DevSecOps] Audit des dépendances PHP (Composer)"
        run: composer audit --no-dev 2>&1 || true

      # ─── DevSecOps : Détection de secrets (Gitleaks) ─────────────────────────
      - name: "[DevSecOps] Détection de secrets (Gitleaks)"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── DevSecOps : Scan filesystem vulnérabilités (Trivy) ──────────────────
      - name: "[DevSecOps] Scan vulnérabilités filesystem (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: '0'

      - name: Generate key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Run Migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: suivi_academique_backend
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: Execute tests with coverage
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: suivi_academique_backend
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test --coverage-clover=coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=foudja-laeti_suivi_academique_backend
            -Dsonar.organization=foudja-laeti
            -Dsonar.php.coverage.reportPaths=coverage.xml
            -Dsonar.sources=app,routes,config
            -Dsonar.tests=tests
            -Dsonar.exclusions=vendor/**,node_modules/**,public/**

      # ─── DevSecOps : Scan image Docker (Trivy) ───────────────────────────────
      - name: "[DevSecOps] Build image Docker (pour scan)"
        run: docker build -t suivi_academique_backend:scan .

      - name: "[DevSecOps] Scan image Docker (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'suivi_academique_backend:scan'
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: '0'

      - name: Build and Push to Docker Hub
        run: |
          echo "${{ secrets.SA_DOKERHUB_TOKEN }}" | docker login -u "${{ secrets.SA_DOCKERHUB_LOGIN }}" --password-stdin
          docker build -t ${{ secrets.SA_DOCKERHUB_LOGIN }}/suivi_academique_backend:latest .
          docker push ${{ secrets.SA_DOCKERHUB_LOGIN }}/suivi_academique_backend:latest

  performance-tests:
    runs-on: ubuntu-latest
    needs: laravel-tests

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@15c43e89cdef867065b0213be354c2841860869e
        with:
          php-version: '8.4'
          extensions: pdo_mysql

      - name: Install Dependencies
        run: composer update -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Start Laravel server
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: /tmp/test.db
        run: |
          php artisan migrate --force
          php artisan serve --host=0.0.0.0 --port=8000 &
          sleep 5

      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz -L | tar xvz
          sudo mv k6-v0.49.0-linux-amd64/k6 /usr/local/bin

      - name: Run k6 performance tests
        run: k6 run tests/performance/load-test.js

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: tests/performance/results.json
